name: Continuous Monitoring of Dockerhub, public ECR, and S3
on:
  workflow_dispatch:
  schedule:
    - cron:  '*/10 * * * *'

permissions:
  id-token: write
  contents: read

jobs:
  monitor-ecr:
    name: Monitor public ECR
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_INTEG_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Public ECR
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 #v1.14.1
        with:
          registry: public.ecr.aws

      - name: Pull an image from public ECR
        id: pull-from-ecr
        run: docker pull public.ecr.aws/xray/aws-xray-daemon:latest

      - name: Publish metric on pulling an image
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.pull-from-ecr.outcome }}" == "failure" ]]; then
            aws cloudwatch put-metric-data --metric-name PullImageFailureFromECR --dimensions failure=rate --namespace MonitorDaemon --value 1 --timestamp $(date +%s)
          else
            aws cloudwatch put-metric-data --metric-name PullImageFailureFromECR --dimensions failure=rate --namespace MonitorDaemon --value 0 --timestamp $(date +%s)
          fi

      - name: Run daemon image
        run: |
          docker run --name xray-daemon public.ecr.aws/xray/aws-xray-daemon:latest -o -n us-west-2 &
          sleep 30

      - name: Publish metrics on daemon startup
        if: ${{ always() }}
        run: |
          if [[ "$(docker container inspect -f '{{.State.Status}}' xray-daemon )" != "running" ]]; then
            aws cloudwatch put-metric-data --metric-name DaemonImageStartupFailureFromECR --dimensions failure=rate --namespace MonitorDaemon --value 1 --timestamp $(date +%s)
          else
            aws cloudwatch put-metric-data --metric-name DaemonImageStartupFailureFromECR --dimensions failure=rate --namespace MonitorDaemon --value 0 --timestamp $(date +%s)
          fi

  monitor-dockerhub:
    name: Monitor docker hub
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_INTEG_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Pull an image from docker hub
        id: pull-from-dockerhub
        run: docker pull amazon/aws-xray-daemon:latest

      - name: Publish metric on pulling an image
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.pull-from-dockerhub.outcome }}" == "failure"  ]]; then
            aws cloudwatch put-metric-data --metric-name PullImageFailureFromDockerhub --dimensions failure=rate --namespace MonitorDaemon --value 1 --timestamp $(date +%s)
          else
            aws cloudwatch put-metric-data --metric-name PullImageFailureFromDockerhub --dimensions failure=rate --namespace MonitorDaemon --value 0 --timestamp $(date +%s)
          fi

      - name: Run daemon image
        run: |
          docker run --name xray-daemon amazon/aws-xray-daemon:latest -o -n us-west-2 &
          sleep 30

      - name: Publish metrics on daemon startup
        if: ${{ always() }}
        run: |
          if [[ "$(docker container inspect -f '{{.State.Status}}' xray-daemon )" != "running" ]]; then
            aws cloudwatch put-metric-data --metric-name DaemonImageStartupFailureFromDockerhub --dimensions failure=rate --namespace MonitorDaemon --value 1 --timestamp $(date +%s)
          else
            aws cloudwatch put-metric-data --metric-name DaemonImageStartupFailureFromDockerhub --dimensions failure=rate --namespace MonitorDaemon --value 0 --timestamp $(date +%s)
          fi

  monitor-s3:
    name: Monitor S3 assets
    runs-on: ubuntu-latest
    # Availability + integrity check for the daemon's S3-hosted installers and
    # executables. Zip and RPM artifacts are signature-verified; DEB artifacts
    # are checked for availability only (see TODO below).
    env:
      # Phase 1 targets the us-east-2 origin bucket. A later change can turn this
      # into a matrix over every replicated region.
      BUCKET_REGION: us-east-2
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_INTEG_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download and verify S3 assets
        if: ${{ always() }}
        run: |
          set -uo pipefail

          BASE="https://s3.${BUCKET_REGION}.amazonaws.com/aws-xray-assets.${BUCKET_REGION}/xray-daemon"
          WORK="$(mktemp -d)"
          cd "$WORK"

          # Publish one metric point. Dimensions match the ECR/Dockerhub jobs
          # (failure=rate) and add the artifact so an alarm names the exact file.
          emit() { # $1=metric-name  $2=value(0|1)  $3=artifact
            aws cloudwatch put-metric-data --metric-name "$1" --dimensions failure=rate,artifact="$3" --namespace MonitorDaemon --value "$2" --timestamp $(date +%s)
          }

          # curl -f exits non-zero on any HTTP error; this tests the real public
          # customer download path (objects are public, no S3 read perms needed).
          download() { # $1=url  $2=outfile
            curl -fsSL --retry 2 -o "$2" "$1"
          }

          # ---- Public signing key (needed for zip + rpm verification) ----------
          KEY_OK=0
          if download "$BASE/aws-xray.gpg" aws-xray.gpg; then
            gpg --import aws-xray.gpg || KEY_OK=1
          else
            KEY_OK=1
          fi
          emit DownloadFailureFromS3 "$KEY_OK" "aws-xray.gpg"

          # ---- Zip artifacts: download + documented gpg --verify flow ----------
          ZIP_ARTIFACTS=(
            "aws-xray-daemon-linux-3.x.zip"
            "aws-xray-daemon-linux-arm64-3.x.zip"
            "aws-xray-daemon-macos-3.x.zip"
            "aws-xray-daemon-windows-process-3.x.zip"
            "aws-xray-daemon-windows-service-3.x.zip"
          )
          for name in "${ZIP_ARTIFACTS[@]}"; do
            dl=0; sig=0
            if download "$BASE/$name" "$name" && download "$BASE/$name.sig" "$name.sig"; then
              if [[ "$KEY_OK" -eq 0 ]] && gpg --verify "$name.sig" "$name"; then
                sig=0
              else
                sig=1
              fi
            else
              dl=1; sig=1   # can't verify what didn't download
            fi
            emit DownloadFailureFromS3 "$dl" "$name"
            emit SignatureVerificationFailureFromS3 "$sig" "$name"
          done

          # ---- RPM artifacts: download + rpm signature check -------------------
          # rpm verification runs inside an Amazon Linux container, not on the
          # ubuntu-latest host: modern Ubuntu's rpm uses the Sequoia backend,
          # which rejects the daemon's (older RSA) signing key and would make
          # every check falsely report SIGNATURES NOT OK. Amazon Linux is also
          # the platform these RPMs actually target.
          RPM_ARTIFACTS=(
            "aws-xray-daemon-3.x.rpm"
            "aws-xray-daemon-arm64-3.x.rpm"
          )
          for name in "${RPM_ARTIFACTS[@]}"; do
            dl=0; sig=0
            if download "$BASE/$name" "$name"; then
              if [[ "$KEY_OK" -eq 0 ]] && docker run --rm -v "$WORK":/w -w /w amazonlinux:2023 \
                   bash -c "rpm --import aws-xray.gpg && rpm -K '$name' | grep -q 'signatures OK'"; then
                sig=0
              else
                sig=1
              fi
            else
              dl=1; sig=1
            fi
            emit DownloadFailureFromS3 "$dl" "$name"
            emit SignatureVerificationFailureFromS3 "$sig" "$name"
          done

          # ---- DEB artifacts: download availability only -----------------------
          # TODO: DEB signature verification uses the _gpgorigin member written by
          # Tool/src/packaging/sign-packages.sh. Verifying it robustly needs the
          # exact member concatenation order and is fragile enough to risk false
          # alarms, so it is deferred to its own change.
          DEB_ARTIFACTS=(
            "aws-xray-daemon-3.x.deb"
            "aws-xray-daemon-arm64-3.x.deb"
          )
          for name in "${DEB_ARTIFACTS[@]}"; do
            dl=0
            download "$BASE/$name" "$name" || dl=1
            emit DownloadFailureFromS3 "$dl" "$name"
          done
