name: Install smoke test of S3 packages

# Installs each S3-hosted OS package and confirms the daemon binary starts --
# the package equivalent of the container-image startup check in
# continuous-monitoring.yml. Heavier than the download/signature checks (it
# boots containers, and emulates arm64), so it runs hourly rather than every
# 10 minutes. Publishes PackageInstallFailureFromS3 to the MonitorDaemon
# namespace (0 = installed and started, 1 = failed).

on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *'

permissions:
  id-token: write
  contents: read

jobs:
  smoke-test:
    name: Smoke test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [rpm-x86_64, rpm-arm64, deb-x86_64, deb-arm64]
    steps:
      - name: Check out repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up QEMU for cross-arch emulation
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_INTEG_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install and run package
        if: ${{ always() }}
        env:
          PACKAGE: ${{ matrix.package }}
        run: .github/scripts/smoke-test-packages.sh
